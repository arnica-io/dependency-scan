trigger:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

variables:
  # Add this variable group in Azure DevOps Library.
  # It should contain secret ARNICA_API_TOKEN.
  - group: arnica-secrets

steps:
  - checkout: self

  - task: NodeTool@0
    inputs:
      versionSpec: "24.x"
    displayName: Use Node 24

  - script: |
      set -euo pipefail
      cd "$(Build.SourcesDirectory)"
      npx --yes "@arnica-io/dependency-scan@1.0.30"
    displayName: Arnica dependency scan
    env:
      # Required: map the variable-group secret into the CLI env name.
      ARNICA_API_TOKEN: $(ARNICA_API_TOKEN)
      # Optional: scan a subdirectory only (alias: SCAN_PATH).
      ARNICA_SCAN_PATH: services/payments
      # Optional: fail (default), alert, or pass (alias: ON_FINDINGS).
      ARNICA_ON_FINDINGS: fail
      # Optional: staging/prod API endpoint.
      # ARNICA_API_BASE_URL: https://api.app.arnica.io
