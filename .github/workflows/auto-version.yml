name: Auto Version on Main

on:
  push:
    branches: [main]
    paths-ignore:
      - "README.md"

concurrency:
  group: auto-version
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version and push tag
        id: tagger
        uses: mathieudutour/github-tag-action@a22cf08638b34d5badda920f9daf6e72c477b07b # v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tag_prefix: v
          release_branches: main
          default_bump: patch
          create_annotated_tag: true

      - name: Create GitHub Release
        if: steps.tagger.outputs.new_tag
        uses: softprops/action-gh-release@6cbd405e2c4e67a21c47fa9e383d020e4e28b836 # v2.3.0
        with:
          tag_name: ${{ steps.tagger.outputs.new_tag }}
          name: Arnica Dependency Security Scan - ${{ steps.tagger.outputs.new_tag }}
          generate_release_notes: true

      - name: Update major tag
        if: steps.tagger.outputs.new_tag
        shell: bash
        run: |
          set -euo pipefail
          TAG_NAME="${{ steps.tagger.outputs.new_tag }}"
          MAJOR_TAG=$(echo "$TAG_NAME" | sed -E 's/^v([0-9]+).*/v\1/')
          git tag -fa "$MAJOR_TAG" -m "Update $MAJOR_TAG tag to $TAG_NAME"
          git push origin "$MAJOR_TAG" --force

      - name: Setup pnpm
        if: steps.tagger.outputs.new_tag
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0

      - name: Setup Node.js
        if: steps.tagger.outputs.new_tag
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        if: steps.tagger.outputs.new_tag
        run: pnpm install

      - name: Build
        if: steps.tagger.outputs.new_tag
        run: pnpm run build

      - name: Set npm version from tag
        if: steps.tagger.outputs.new_tag
        env:
          NEW_VERSION: ${{ steps.tagger.outputs.new_version }}
        run: npm version "${NEW_VERSION}" --no-git-tag-version

      - name: Publish to npm
        if: steps.tagger.outputs.new_tag
        run: pnpm publish --access public --no-git-checks
        env:
          NPM_CONFIG_PROVENANCE: "true"

      - name: Generate App token
        if: steps.tagger.outputs.new_tag
        id: app-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 #v3.0.0
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout main with App token
        if: steps.tagger.outputs.new_tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          ref: main
          token: ${{ steps.app-token.outputs.token }}

      - name: Update version references on main
        if: steps.tagger.outputs.new_tag
        shell: bash
        env:
          TAG_NAME: ${{ steps.tagger.outputs.new_tag }}
          NEW_VERSION: ${{ steps.tagger.outputs.new_version }}
        run: |
          set -euo pipefail
          git fetch origin main
          git fetch origin tag "${TAG_NAME}" --no-tags
          git checkout main
          git reset --hard origin/main

          RELEASE_SHA=$(git rev-list -n 1 "${TAG_NAME}")
          MAJOR_VERSION=$(echo "${NEW_VERSION}" | sed -E 's/^([0-9]+).*/\1/')

          # Update GitHub Action SHA pins in README
          sed -i -E "s|([A-Za-z0-9_.-]+/dependency-scan@)[^[:space:]]+([ ]*#[^\n]*)?|\1${RELEASE_SHA} # ${TAG_NAME}|g" README.md

          # Update npm version pins in README (e.g., @arnica-io/dependency-scan@1.0.24 → @1.0.25)
          sed -i -E "s|@arnica-io/dependency-scan@[0-9]+\.[0-9]+\.[0-9]+|@arnica-io/dependency-scan@${NEW_VERSION}|g" README.md

          if git diff --quiet -- README.md; then
            echo "Files already up to date for ${TAG_NAME}."
            exit 0
          fi

          git add README.md
          git commit -m "docs: update version references to ${TAG_NAME} [skip ci]"
          git push origin main

          {
            echo "### Version References Updated"
            echo "- GitHub Action SHA: \`${RELEASE_SHA}\` (${TAG_NAME})"
            echo "- npm version: \`${NEW_VERSION}\`"
          } >> "$GITHUB_STEP_SUMMARY"
