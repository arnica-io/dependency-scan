name: Auto Version on Main

on:
  push:
    branches: [main]
    paths-ignore:
      - "README.md"

concurrency:
  group: auto-version
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version and push tag
        id: tagger
        uses: mathieudutour/github-tag-action@a22cf08638b34d5badda920f9daf6e72c477b07b # v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tag_prefix: v
          release_branches: main
          default_bump: patch
          create_annotated_tag: true

      - name: Create GitHub Release
        if: steps.tagger.outputs.new_tag
        uses: softprops/action-gh-release@6cbd405e2c4e67a21c47fa9e383d020e4e28b836 # v2.3.0
        with:
          tag_name: ${{ steps.tagger.outputs.new_tag }}
          name: Arnica Dependency Security Scan - ${{ steps.tagger.outputs.new_tag }}
          generate_release_notes: true

      - name: Update major tag
        if: steps.tagger.outputs.new_tag
        shell: bash
        run: |
          set -euo pipefail
          TAG_NAME="${{ steps.tagger.outputs.new_tag }}"
          MAJOR_TAG=$(echo "$TAG_NAME" | sed -E 's/^v([0-9]+).*/v\1/')
          git tag -fa "$MAJOR_TAG" -m "Update $MAJOR_TAG tag to $TAG_NAME"
          git push origin "$MAJOR_TAG" --force

      - name: Generate App token
        if: steps.tagger.outputs.new_tag
        id: app-token
        uses: actions/create-github-app-token@3ff1caaa28b64c9cc276ce0a02e2ff584f3900c5 # v1.12.0
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout main with App token
        if: steps.tagger.outputs.new_tag
        uses: actions/checkout@85e6279cec87321a52edac9c87bce653a07cf6c2 # v4.2.2
        with:
          ref: main
          token: ${{ steps.app-token.outputs.token }}

      - name: Update README version on main
        if: steps.tagger.outputs.new_tag
        shell: bash
        env:
          TAG_NAME: ${{ steps.tagger.outputs.new_tag }}
        run: |
          set -euo pipefail
          git fetch origin main
          git checkout main
          git reset --hard origin/main

          sed -i -E "s|([A-Za-z0-9_.-]+/dependency-scan@)[^[:space:]]+|\1${TAG_NAME}|g" README.md

          if git diff --quiet -- README.md; then
            echo "README.md already up to date for ${TAG_NAME}."
            exit 0
          fi

          git add README.md
          git commit -m "docs: update README usage to ${TAG_NAME} [skip ci]"
          git push origin main

          {
            echo "### README Updated"
            echo "Version references updated to \`${TAG_NAME}\`"
          } >> "$GITHUB_STEP_SUMMARY"
