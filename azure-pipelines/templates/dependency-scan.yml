# Arnica Dependency Security Scan - Azure DevOps Pipeline Template
#
# Runs the published npm package (@arnica-io/dependency-scan) via npx against the
# checked-out repository (use checkout: self before this template).
#
# Prerequisites:
#   1. checkout: self (repository to scan)
#   2. ARNICA_API_TOKEN as a pipeline variable or variable group secret
#   3. If you load this file from GitHub: a service connection + repository resource
#      (see azure-pipelines/examples/example-pipeline.yml)
#
# For a reproducible install from source (pnpm lockfile) instead of npx, see the
# Azure DevOps section in README.md.
#
# Usage:
#   resources:
#     repositories:
#       - repository: dependency-scan
#         type: github
#         name: arnica-io/dependency-scan
#         endpoint: <your-github-service-connection>
#         ref: refs/tags/v1.0.24
#
#   steps:
#     - checkout: self
#     - checkout: dependency-scan   # only so the template path resolves
#     - template: azure-pipelines/templates/dependency-scan.yml@dependency-scan
#       parameters:
#         repositoryUrl: $(Build.Repository.Uri)
#         branch: $(Build.SourceBranchName)

parameters:
  - name: repositoryUrl
    type: string
    displayName: "Repository URL associated with the scan"

  - name: branch
    type: string
    default: "main"
    displayName: "Branch name associated with the scan"

  - name: scanPath
    type: string
    default: "."
    displayName: "Repository path to scan"

  - name: apiBaseUrl
    type: string
    default: "https://api.app.arnica.io"
    displayName: "Arnica API base URL"

  - name: scanTimeoutSeconds
    type: number
    default: 900
    displayName: "Maximum time to wait for scan completion (seconds)"

  - name: onFindings
    type: string
    default: "fail"
    values:
      - fail
      - alert
      - pass
    displayName: "Behavior when findings are detected"

  - name: debug
    type: boolean
    default: false
    displayName: "Enable verbose debug logs"

  - name: npmPackageVersion
    type: string
    default: "1.0.24"
    displayName: "Published @arnica-io/dependency-scan version (npm)"

steps:
  - task: NodeTool@0
    inputs:
      versionSpec: "24.x"
    displayName: "Setup Node.js"

  - script: |
      set -euo pipefail
      cd "$(Build.SourcesDirectory)"
      npx --yes "@arnica-io/dependency-scan@${NPM_PACKAGE_VERSION}"
    displayName: "Arnica Dependency Scan (npm package)"
    env:
      NPM_PACKAGE_VERSION: ${{ parameters.npmPackageVersion }}
      INPUT_REPOSITORY_URL: ${{ parameters.repositoryUrl }}
      INPUT_BRANCH: ${{ parameters.branch }}
      INPUT_SCAN_PATH: ${{ parameters.scanPath }}
      INPUT_API_BASE_URL: ${{ parameters.apiBaseUrl }}
      INPUT_SCAN_TIMEOUT_SECONDS: ${{ parameters.scanTimeoutSeconds }}
      INPUT_ON_FINDINGS: ${{ parameters.onFindings }}
      INPUT_DEBUG: ${{ parameters.debug }}
      ARNICA_API_TOKEN: $(ARNICA_API_TOKEN)
